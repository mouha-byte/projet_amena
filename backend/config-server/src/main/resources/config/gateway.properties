spring.application.name=gateway
server.port=8085

spring.main.web-application-type=reactive

spring.cloud.gateway.routes[0].id=COURS
spring.cloud.gateway.routes[0].uri=lb://cours-ms
spring.cloud.gateway.routes[0].predicates[0]=Path=/cours/**

spring.cloud.gateway.routes[1].id=INSCRIPTIONS
spring.cloud.gateway.routes[1].uri=lb://inscription-ms
spring.cloud.gateway.routes[1].predicates[0]=Path=/inscriptions/**

spring.cloud.gateway.routes[2].id=FEEDBACKS
spring.cloud.gateway.routes[2].uri=lb://feedback-ms
spring.cloud.gateway.routes[2].predicates[0]=Path=/feedbacks/**

spring.cloud.gateway.routes[3].id=RECLAMATIONS
spring.cloud.gateway.routes[3].uri=lb://reclamation-ms
spring.cloud.gateway.routes[3].predicates[0]=Path=/reclamations/**

spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true

logging.level.org.springframework.cloud.gateway=INFO
