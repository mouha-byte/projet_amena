spring.application.name=reclamation-ms
spring.config.import=optional:configserver:http://localhost:8888

server.port=8091

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka

spring.datasource.url=jdbc:h2:mem:reclamationdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true

reclamation.classification.high-keywords=retard intervention,urgence,danger,accident,panne totale,service indisponible,impossible d utiliser,bloque
reclamation.classification.medium-keywords=bug,erreur,deconnexion,paiement,lent,instable,retard,interruption
reclamation.classification.low-keywords=gps ne marche pas,gps,suggestion,affichage
reclamation.classification.high-threshold=70
reclamation.classification.medium-threshold=35

management.endpoints.web.exposure.include=health,info,refresh
