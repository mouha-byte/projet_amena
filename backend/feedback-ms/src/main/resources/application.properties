spring.application.name=feedback-ms
spring.config.import=optional:configserver:http://localhost:8888

server.port=8090

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka

spring.datasource.url=jdbc:h2:mem:feedbackdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true

feedback.moderation.blocked-words=insulte,haine,raciste,violence,arnaque,spam,escroc
feedback.moderation.auto-block-threshold=70
feedback.auto-reclamation.enabled=true
feedback.auto-reclamation.negative-threshold=2

management.endpoints.web.exposure.include=health,info,refresh
